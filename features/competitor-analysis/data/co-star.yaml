name: Co-Star
website: costarastrology.com
tagline: "Hyper-personalized astrology"
founded: 2017
headquarters: New York, USA

# Positioning
primary_use_case: "Social astrology — daily horoscopes + friend comparisons"
target_audience: "Women 18-25, social-first, casual astrology interest"
market_position: "Category leader in social astrology"

# Pricing
pricing_model: subscription
free_tier: true
free_tier_limits: "Daily horoscopes, birth chart, friend compatibility, push notifications"
monthly_price: "$9/month"
annual_price: "N/A"

# Features
features:
  western_astrology: 4
  chinese_astrology: 0
  wuxing_elements: 0
  cross_system_fusion: 0
  personality_quizzes: 0
  birth_chart_visual: 3
  daily_horoscope: 5
  social_features: 5
  voice_agent: 0
  compatibility: 5
  mobile_app: 5
  offline_mode: 1
  bilingual: 1

# Strengths
strengths:
  - "Category-defining brand in social astrology"
  - "Strong viral/social loop (friend comparisons, sharing)"
  - "Witty, meme-worthy AI-generated daily copy"
  - "Habit-forming push notifications"
  - "Large user base and network effects"
  - "NASA data branding lends credibility"
  - "Free tier is very generous"

# Weaknesses
weaknesses:
  - "Only Western astrology (no BaZi, WuXing, or any Eastern system)"
  - "Readings are brief and repetitive over time"
  - "No educational depth — doesn't explain why"
  - "AI-only content — no human astrologer voice"
  - "Premium feels overpriced for what it adds"
  - "Privacy concerns (extensive data collection)"

# Best for
best_for:
  - "Young, social users wanting daily bite-sized astrology"
  - "People who want to compare charts with friends"
  - "Casual astrology interest (not deep study)"

# Not ideal for
not_ideal_for:
  - "Anyone wanting depth or multi-system analysis"
  - "Users interested in Chinese astrology or BaZi"
  - "Privacy-conscious users"
  - "Those who find daily horoscopes repetitive"

# Common complaints (from reviews)
common_complaints:
  - "Readings get repetitive after a few months"
  - "Premium doesn't add enough value for $9/month"
  - "Push notifications can feel spammy"
  - "No explanation of astrological concepts"

# Search volume indicators
search_terms:
  - "co-star alternative": high
  - "co-star astrology app": very high
  - "apps like co-star": medium
